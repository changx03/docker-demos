services:
  ros2-dev:
    build: .
    container_name: ros2-dev
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    volumes:
      - "/home/luke/workspace/boxfish:/app"
      - "/opt/pylon:/opt/pylon:ro"
    privileged: true
    restart: unless-stopped
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds.xml
